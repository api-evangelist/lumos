aid: lumos
name: Lumos
description: >-
  Lumos is the first Autonomous Identity Platform that helps organizations
  discover and manage access to all apps with enhanced security, increased
  productivity, and reduced cost. Lumos automates access requests, enforces
  least privilege, speeds up user access reviews, and eliminates extra SaaS app
  spending through 80+ connectors and an API.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - SaaS Management
  - Identity Governance
  - Access Management
  - Identity Platform
  - Access Reviews
  - Least Privilege
  - Provisioning
  - Deprovisioning
  - Shadow IT
url: >-
  https://raw.githubusercontent.com/api-evangelist/lumos/refs/heads/main/apis.yml
created: '2026-03-16'
modified: '2026-03-27'
specificationVersion: '0.19'
apis:
  - aid: lumos:rest-api
    name: Lumos REST API
    description: >-
      The Lumos REST API enables programmatic access to the Lumos identity
      platform for automating tasks such as managing users, apps, access
      requests, and governance workflows. All requests require a bearer token
      (prefixed lsk_) in the Authorization header.
    humanURL: https://developers.lumos.com/docs/rest-api
    tags:
      - Identity
      - Access Management
      - Automation
      - Governance
    properties:
      - url: https://developers.lumos.com/reference/lumos-api
        type: Documentation
      - url: https://developers.lumos.com/docs/quick-start
        type: GettingStarted
      - url: https://developers.lumos.com/docs/rest-api
        type: Authentication
  - aid: lumos:connector-sdk
    name: Lumos Connector SDK
    description: >-
      The Lumos Connector SDK allows developers to build custom connectors that
      integrate third-party applications with the Lumos platform, enabling
      automated provisioning, deprovisioning, and access management for apps
      not yet supported natively.
    humanURL: https://developers.lumos.com/docs/connector-sdk
    tags:
      - SDK
      - Connectors
      - Integrations
    properties:
      - url: https://developers.lumos.com/docs/connector-sdk
        type: Documentation
      - url: https://developers.lumos.com/docs/building-a-lumos-connector-step-by-step-tutorial
        type: GettingStarted
